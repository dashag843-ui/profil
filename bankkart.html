<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои карты - Серф-а-ла-рус</title>
    <!-- Montserrat for main text -->
    <link rel="stylesheet" href="style-bankkart.css">
</head>
<body>

    <div class="cards-container">
        <h1 class="page-title">Мои карты</h1>

        <div class="cards-grid" id="cardsGrid">
            <!-- Card 1 -->
            <div class="bank-card type-1">
                <div class="card-top">
                    <div class="card-logos">
                        <span class="logo-visa">VISA</span>
                        <span class="logo-mc" style="font-size: 0.8rem; display:flex; align-items:center;">MasterCard</span>
                    </div>
                    <span class="status-badge">Активна</span>
                </div>
                <div class="card-number">**** **** **** 3783</div>
                <button class="delete-btn" onclick="deleteCard(this)">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>

            <!-- Card 2 -->
            <div class="bank-card type-2">
                <div class="card-top">
                    <div class="card-logos">
                        <span class="logo-mc" style="font-size: 0.8rem; display:flex; align-items:center;">MasterCard</span>
                        <span class="logo-mir">МИР</span>
                    </div>
                    <span class="status-badge">Активна</span>
                </div>
                <div class="card-number">**** **** **** 2992</div>
                <button class="delete-btn" onclick="deleteCard(this)">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>

            <!-- Card 3 -->
            <div class="bank-card type-3">
                <div class="card-top">
                    <div class="card-logos">
                        <span class="logo-visa">VISA</span>
                    </div>
                    <span class="status-badge">Активна</span>
                </div>
                <div class="card-number">**** **** **** 2468</div>
                <button class="delete-btn" onclick="deleteCard(this)">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </div>

        <button class="add-card-btn" onclick="openModal()">Добавить карту</button>
    </div>

    <!-- Add Card Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="add-form-container">
            <button class="close-modal" onclick="closeModal()">×</button>
            <h2 class="form-title">Добавляем новую карту</h2>
            <form id="addCardForm" onsubmit="handleAddCard(event)">
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19" required id="cardNumberInput">
                </div>
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="DARIA GAVRILOVA" required style="text-transform: uppercase;">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="MM/YY" maxlength="5" required id="expiryInput">
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="CVV" maxlength="3" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Добавить</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('addModal');
        const grid = document.getElementById('cardsGrid');
        const cardNumberInput = document.getElementById('cardNumberInput');
        const expiryInput = document.getElementById('expiryInput');

        // Modal Functions
        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Input Formatting
        cardNumberInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(.{4})/g, '$1 ').trim();
            e.target.value = value;
        });

        expiryInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });

        // Add Card Logic
        function handleAddCard(e) {
            e.preventDefault();
            
            const number = cardNumberInput.value;
            const last4 = number.slice(-4);
            
            // Determine random style for new card
            const types = ['type-1', 'type-2', 'type-3'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            
            // Determine Logo based on randomness for demo purposes
            let logoHtml = '<span class="logo-visa">VISA</span>';
            if (randomType === 'type-2') {
                logoHtml = '<span class="logo-mc" style="font-size: 0.8rem; display:flex; align-items:center;">MasterCard</span><span class="logo-mir">МИР</span>';
            } else if (randomType === 'type-1') {
                logoHtml = '<span class="logo-visa">VISA</span><span class="logo-mc" style="font-size: 0.8rem; display:flex; align-items:center;">MasterCard</span>';
            }

            const newCard = document.createElement('div');
            newCard.className = `bank-card ${randomType}`;
            newCard.innerHTML = `
                <div class="card-top">
                    <div class="card-logos">
                        ${logoHtml}
                    </div>
                    <span class="status-badge">Активна</span>
                </div>
                <div class="card-number">**** **** **** ${last4}</div>
                <button class="delete-btn" onclick="deleteCard(this)">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            `;

            // Add animation
            newCard.style.opacity = '0';
            newCard.style.transform = 'translateY(20px)';
            grid.appendChild(newCard);
            
            setTimeout(() => {
                newCard.style.transition = 'all 0.5s';
                newCard.style.opacity = '1';
                newCard.style.transform = 'translateY(0)';
            }, 10);

            // Reset and close
            document.getElementById('addCardForm').reset();
            closeModal();
        }

        // Delete Card Logic
        function deleteCard(btn) {
            const card = btn.closest('.bank-card');
            card.style.transform = 'scale(0.9)';
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
            }, 300);
        }
    </script>
</body>
</html>
